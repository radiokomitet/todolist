<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>Projects</h2>
      
      <div id="projects-list"></div>

      <form id="project-form">
        <input type="text" id="project-input" placeholder="New project..." required>
        <button type="submit">Add</button>
      </form>
    </aside>

    <!-- Main content -->
    <main class="main">

      <div class="header">
        <h2 id="current-project">Default</h2>
        <button type="button" id="mode-toggle">Night mode</button>
      </div>

      <!-- Todo list -->
      <div id="todo-list"></div>

      <!-- Add todo -->
      <form id="todo-form">
        <input type="text" id="todo-title" placeholder="Title" required>
        <input type="text" id="todo-desc" placeholder="Description">
        <input type="date" id="todo-date">
        
        <select id="todo-priority">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>

        <button type="submit">Add Todo</button>
      </form>

    </main>

  </div>

</body>
</html>
